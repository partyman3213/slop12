<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>PostBlitz</title>
    <link rel="icon" href="images/li.svg" type="image/svg+xml">
    <link rel="stylesheet" href="stylee.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo"><i class="poste">Edit</i><i class="blitz">PhotosAI</i></div>
                <div class="navlistcontainer">
                <ul class="nav-ul">
                    <li>
                        <a id="Nav-Login" href="/auth/google">Login</a>
                    </li>
                    
                    <li>
                        <a id="Nav-About" href="/guide">Guide</a>
                    </li>
                    <li>
                        <a id="Nav-Pricing" href="/pricing">Pricing</a>
                    </li>
                    
                </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="main">





     <section>
        <div class="container">
            <div class="first-text">
            <h1 id="target">Edit Photos <span id="Fasterr">Faster with AI</span></h1>
            <p class="first-lower-text">
                Remove Objects and Edit Text in Image  - <span id="Guide"><a href="/guide">Guide</a></span>
            </p>
            </div>
            
        </div>
     </section>



      </div>
     
     <section class="sec-gen">

          <!-- Credits -->
            <div  class="gen-head">
                <div class="logo-wrapper">
                    <p class="logo-edit"> Guide </p>
                    <div class="gen-logo">
                        <p id="Credits-Text">Credits:</p>
                        <p id="Credits"><a id="Nav-Login" href="/auth/google">Login</a></p>
                    </div>
                    
                </div>
         

        <div class="container">
           
                          <!-- Text area -->
            <div class="gen-main">
                
                <form action="#" class="prompt-form">
                    
                    <div class="prompt-container">

                        <button id="idktry" class="gen-mode" type="button"> <i>Upload</i></button>
                        
                        <div class="addImageAndText-container">
                         <textarea id ="typeArea" class="prompt-input" placeholder="Write here"
                          required autofocus></textarea>
                          <div class="addImage" id="addImageID">
                            <label for="addImageButton" class="custom-file-upload" id="labelPreview">
                                <span id="plusText">+</span>
                                <img id="imagePreview" src="" style="display: none;" />
                            </label>
                            <input type="file" id="addImageButton" accept="image/*"></input>
                          </div>
                        </div>

                         <div class="buttonsC">
                         
                         <button type="submit" class="generate-btn">Generate</button>
                         </div>
                         

                    </div>


                     <!-- Gallery grid-->
                    <div class="gallery-grid">

                        <div id="img-cardID" class="img-card">
                            <div class="status-container">
                                <div class="spinner"></div>
                                <div class="errora"></div>
                            </div>
                            <img src="images/obi.jpg" alt="" class="result-img">
                            <div class="img-overlay">

                                <button class="image-edit-btn" type="submit">
                                    <p>Retry</p>
                                </button>
                                <button class="image-download-btn" id="downloadBtn" type="button">
                                    <p>Download</p>
                                </button>
                            </div>
                        </div>

                        

                        

                    </div>
                </form>

            </div>
        </div>
     </section>

     

    </main>

    <script type="module" src="script.js"></script>


</body>
</html>
