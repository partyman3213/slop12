     <section>
        <div class="container">
            <div class="first-text">
            <h1 id="target">Edit Photos <span id="Fasterr">Faster</span></h1>
            <p class="first-lower-text">
                Cost-effective online photo editor for simple tasks like object removal, text changes, and color adjustments  - <span id="Guide"><a href="/guide">Guide</a></span>
            </p>
            </div>
            
        </div>
     </section>



     <section class="sec-clouds">
        <div class="cloud-container">
            <img src="images/cloudss.png" alt="cloud image">
            <img src="images/cloudss.png" alt="cloud image">
        </div>
     </section>
     
     <section class="sec-gen">
        <div class="container">
            <!-- Credits -->
            <div  class="gen-head">
                <div class="logo-wrapper">
                    <p class="logo-edit"> Guide </p>
                    <div class="gen-logo">
                        <p id="Credits-Text">Credits:</p>
                        <p id="Credits"><a id="Nav-Login" href="/auth/google">Login</a></p>
                    </div>
                    
                </div>
            </div>
                          <!-- Text area -->
            <div class="gen-main">
                <form action="#" class="prompt-form">
                    <div class="prompt-container">
                        <div class="addImageAndText-container">
                         <textarea id ="typeArea" class="prompt-input" placeholder="Write here"
                          required autofocus></textarea>
                          <div class="addImage">
                            <label for="addImageButton" class="custom-file-upload" id="labelPreview">
                                <span id="plusText">+</span>
                                <img id="imagePreview" src="" style="display: none;" />
                            </label>
                            <input type="file" id="addImageButton" accept="image/*"></input>
                          </div>
                        </div>

                         <div class="buttonsC">
                         <button id="idktry" class="gen-mode" type="button"> Upload</button>
                         <button type="submit" class="generate-btn">Generate</button>
                         </div>
                         

                    </div>


                     <!-- Gallery grid-->
                    <div class="gallery-grid">

                        <div id="img-cardID" class="img-card">
                            <div class="status-container">
                                <div class="spinner"></div>
                                <div class="errora"></div>
                            </div>
                            <img src="images/obi.jpg" alt="" class="result-img">
                            <div class="img-overlay">

                                <button class="image-edit-btn" type="submit">
                                    <p>Retry</p>
                                </button>
                                <button class="image-download-btn" id="downloadBtn" type="button">
                                    <p>Download</p>
                                </button>
                            </div>
                        </div>

                        

                        

                    </div>
                </form>

            </div>
        </div>
     </section>
