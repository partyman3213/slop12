<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <header>
        <nav class="navbar">
            <div class="container">

                <div class="navlistcontainer">
                <ul class="nav-ul">
                    <li>
                        <a id="Nav-Login" href="/auth/google">Login</a>

                    <li>

                    </li>
                    
                </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="main">





     <section>
        <div class="container">
            <div class="first-text">
            <h1 id="target">Edit Photos <span id="Fasterr">Faster with AI</span></h1>
            <p class="first-lower-text">
                How to Remove Objects and Edit Text in an Image  - <span id="Guide"><a href="/guide">Guide</a></span>
            </p>
            </div>
            
        </div>
     </section>



      </div>
     
     <section class="sec-gen">

          <!-- Credits -->
            <div  class="gen-head">
                <div class="logo-wrapper">
                    <p class="logo-edit"> Guide </p>
                    <div class="gen-logo">
                        <p id="Credits-Text">Credits:</p>
                        <p id="Credits"><a id="Nav-Login" href="/auth/google">Login</a></p>
                    </div>
                    
                </div>
         

        <div class="container">
           
                          <!-- Text area -->
            <div class="gen-main">
                
                <form action="#" class="prompt-form">
                    
                    <div class="prompt-container">

                     <div class="droparea">

                        <button id="idktry" class="gen-mode" type="button"> <i>Upload</i></button>
                        
                     </div>
                        <div class="addImageAndText-container">
                         <textarea id ="typeArea" class="prompt-input" placeholder="Write here"

                                <span id="plusText">+</span>

                          </div>
                        </div>

                         <div class="buttonsC">

                    </div>


                     <!-- Gallery grid-->

                                <div class="errora"></div>

                                <button class="image-edit-btn" type="submit">
